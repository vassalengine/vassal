Dialogs.removed_code_message=<html><p><b>\u65e0\u6cd5\u6253\u5f00\u6b64\u6a21\u5757\uff0c\u56e0\u4e3a\u5b83\u5305\u542b\u7684\u201c\u81ea\u5b9a\u4e49\u4ee3\u7801\u201d\u5f15\u7528\u4e86\u5728\u4e00\u5e74\u591a\u524d\u5df2\u5ba3\u5e03\u5f03\u7528\u5e76\u5df2\u88ab\u79fb\u9664\u7684 VASSAL \u7c7b\u3001\u65b9\u6cd5\u6216\u5b57\u6bb5\u3002</b></p><p><b>\u5982\u679c\u4f60\u662f\u6a21\u5757\u4f7f\u7528\u8005</b>\uff1a\u8bf7\u5148\u5230<a href="https://vassalengine.org/wiki/Category:Modules">\u6211\u4eec\u7684\u6a21\u5757\u5e93</a>\u786e\u8ba4\u4f60\u4f7f\u7528\u7684\u662f\u8be5\u6a21\u5757\u7684\u6700\u65b0\u7248\u672c\u3002\u5982\u679c\u5df2\u662f\u6700\u65b0\u7248\u672c\uff0c\u8bf7\u8054\u7cfb\u6a21\u5757\u7684\u8bbe\u8ba1\u8005/\u7ef4\u62a4\u8005\uff0c\u8ba9\u5176\u4fee\u6b63\u81ea\u5b9a\u4e49\u4ee3\u7801\u4e2d\u7684\u95ee\u9898\u3002\u5982\u679c\u6a21\u5757\u7ef4\u62a4\u8005\u5df2\u4e0d\u518d\u6d3b\u8dc3\u6216\u65e0\u6cd5\u8054\u7cfb\uff0c\u8bf7\u5728 VASSAL \u8bba\u575b\u7684\u201c\u6280\u672f\u652f\u6301\u4e0e\u7f3a\u9677\u201d\u7248\u5757\u53d1\u5e16\u6c42\u52a9\uff1a<a href="https://forum.vassalengine.org">https://forum.vassalengine.org</a>\u3002</p><p><b>\u5982\u679c\u4f60\u662f\u6a21\u5757\u8bbe\u8ba1\u8005/\u7ef4\u62a4\u8005</b>\uff1a\u8981\u8fd0\u884c\u6b64\u6a21\u5757\uff0c\u5fc5\u987b\u66ff\u6362\u4e0b\u5217\u7c7b\u3001\u65b9\u6cd5\u6216\u5b57\u6bb5\u7684\u4f7f\u7528\u5e76\u91cd\u65b0\u7f16\u8bd1\u81ea\u5b9a\u4e49\u4ee3\u7801\uff08\u4e5f\u53ef\u4ee5\u4ece\u6a21\u5757\u4e2d\u79fb\u9664\u81ea\u5b9a\u4e49\u4ee3\u7801\uff09\u3002\u8bf7\u67e5\u9605<a href="https://vassalengine.org/javadoc/">https://vassalengine.org/javadoc/</a>\u4e2d\u5df2\u79fb\u9664\u9879\u7684 javadoc \u4ee5\u83b7\u53d6\u66ff\u6362\u5efa\u8bae\u3002\u5982\u679c\u4f60\u4e0d\u662f\u539f\u7ef4\u62a4\u8005\u4e14\u4e0d\u77e5\u5982\u4f55\u5904\u7406\uff0c\u8bf7\u5728 VASSAL \u8bba\u575b\u7684\u201c\u6280\u672f\u652f\u6301\u4e0e\u7f3a\u9677\u201d\u7248\u5757\u53d1\u5e16\u6c42\u52a9\uff1a<a href="https://forum.vassalengine.org">https://forum.vassalengine.org</a>\u3002</p></html>
