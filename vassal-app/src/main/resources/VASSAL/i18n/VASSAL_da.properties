Dialogs.removed_code_title=Inkompatibel brugertilpasset kode
Dialogs.removed_code_heading=Inkompatibel brugertilpasset kode
Dialogs.removed_code_message=<html><p><b>Dette modul kan ikke ĺbnes, da den indeholder "brugertilpasset kode", der refererer til VASSAL-klasser, metoder eller attributer, som blev annonceret som forćldet for mere end et ĺr siden og er siden blevet fjernet.</b></p><p><b>HVIS DU ER EN MODULBRUGER</b>: Tjek <a href="https://vassalengine.org/wiki/Category:Modules">vores modulbibliotek</a> fřrst for at sikre dig, at du bruger den mest aktuelle version af dette modul. Hvis dette er den mest aktuelle version af dette modul, skal du kontakte modul designeren / ejeren og fĺ dem til at rette fejlene i deres brugertilpassede kode. Hvis modulejeren ikke lćngere er aktiv eller ikke kan findes, skal du venligst indsende en besked i Technical Support foraene pĺ <a href="https://forum.vassalengine.org">https://forum.vassalengine.org</a>.</p><p><b>HVIS DU ER MODULDESIGNER/VEDLIGEHOLDER</b>: For at křre dette modul skal brugen af klasserne, metoderne eller felterne, der er anfřrt nedenfor, erstattes og den brugertilpassede kode ompiles (alternativt kan den brugertilpassede kode fjernes fra modulet). Se javadoc for de fjernede elementer pĺ <a href="https://vassalengine.org/javadoc/">https://vassalengine.org/javadoc/</a> for rĺdgivning om, hvordan de kan erstattes. Hvis du ikke er den oprindelige vedligeholder og ikke har kendskab til, hvordan du gřr dette, skal du indsende en besked i Technical Support-foraene pĺ <a href="https://forum.vassalengine.org">https://forum.vassalengine.org</a>.</p></html>

Dialogs.deprecated_code_title=Forćldet brugertilpasset kode
Dialogs.deprecated_code_heading=Forćldet brugertilpasset kode
Dialogs.deprecated_code_message=<html><p><b>Dette modul indeholder "brugertilpasset kode", der refererer VASSAL-klasser, metoder eller attributer, som er forćldede og som risikerer at blive fjernet i en fremtidig version.</b></p><p><b>HVIS DU ER EN MODUL BRUGER</b>: Tjek <a href="https://vassalengine.org/wiki/Category:Modules">vores modullibrary</a> fřrst for at sikre, at du bruger den seneste version af dette modul. Du kan křre modulet for nu, men du vil mĺske give besked til modul designeren / vedligeholderen om, at deres brugertilpassede kode skal opdateres.</p><p><b>HVIS DU ER MODULEDESIGNER / VEDLIGEHOLDER</b>: Brugen af de nedenfor angivne klasser, metoder eller felter skal erstattes, og den brugertilpassede kode skal genkompileres, fřr disse klasser, metoder eller felter fjernes. Se venligst javadoc for de forćldede elementer pĺ <a href="https://vassalengine.org/javadoc/">https://vassalengine.org/javadoc/</a> for rĺd om, hvordan man erstatter dem. Hvis du ikke er den oprindelige vedligeholder og ikke har kendskab til, hvordan man gřr dette, bedes du sende en besked i Technical Support-foraene pĺ <a href="https://forum.vassalengine.org">httsp://forum.vassalengine.org</a>.</p></html>

Dialogs.out_of_date=Forćldet brugertilpasset kode

Dialogs.deprecated.later=en senere dato
Dialogs.deprecated.message=Dette modul indeholder forćldet brugertilpasset kode, som ikke er garanteret at virke med nyere versioner af VASSAL, der er frigivet efter %1$s.
Dialogs.deprecated.detailed_message=Forćldet VASSAL-funktion %1$s kaldt fra brugertilpasset kode-metode %2$s. Denne VASSAL-metode er planlagt til at blive fjernet efter %3$s.
Dialogs.check_for_updated_module=Kontroller venligst, om der er en opdateret version af dette modul. Hvis ikke, kontakt venligst vedligeholderen af dette modul og bed om at det bliver rettet, eller send en besked pĺ Vassal-foraene og bed om hjćlp.
Dialogs.out_dated_usage=Dette modul indeholder brugertilpasset kode, der kalder ind i VASSAL pĺ en mĺde, der ikke lćngere anbefales (%1$s). Dette kan resultere i dĺrlig ydeevne og/eller fejl.
Dialogs.incompatible.title=Inkompatibel brugertilpasset kode
Dialogs.incompatible.heading=Den bruger tilpasseede kode i dette modul skal genkompileres
Dialogs.incompatible.message=Dette modul indeholder brugerdefineret Java-kode (%1$s), som ikke er blevet kompileret til at vćre Java 11-kompatibel. Som resultat vil dette modul ikke křre pĺ alle de versioner af Java, som VASSAL understřtter.
Dialogs.module_version_incompatible=Filen er skrevet i en anden Modul version
Dialogs.module_version_incompatible_sequence=Den fil, du forsřger at indlćse, kan vćre skrevet af en anden version af dette modul, og din version kan derfor ikke finde nogle af de data, den leder efter. Fortsat brug af denne version vil muligvis ikke give en korrekt reprćsentation af den komplette spil tilstand.
Dialogs.check_for_updated_vmod=Kontroller venligst, at bĺde du og din modstander bruger samme version af modulet.

