# FIXME: title is wrong for bugs not arriving via the ExceptionHandler
BugDialog.title=Ufangede undtagelse
BugDialog.heading=Hjĉlp os med at rette denne fejl!
BugDialog.message=<html>VASSAL havde en intern fejl?<i>Du kan hjĉlpe!</i></html>
BugDialog.collecting_details=VASSAL havde en intern fejl. Vent venligst mens vi indsamler detaljer.
BugDialog.current_version_instructions=<html><b>Hjĉlp os med at rette dette</b> ved at sende os en beskrivelse af, hvad du gjorde, da fejlen opstod, og <u>giv os en mċde at kontakte dig pċ, hvis vi har spĝrgsmċl.</u> <i>Det er endnu mere nyttigt, hvis du er klar over handlinger eller trin, der kan reproducere denne fejl pċlideligt, at beskrive trinnene for os detaljeret.</i> Hvis du bruger et modul, som du ikke har fċet fra VASSAL-siden (f.eks. hvis du selv laver det, eller du hentede det et andet sted), sċ lad os venligst vide, hvor vi kan fċ en kopi. Jo mere information du kan give os, jo mere sandsynligt (og jo hurtigere!) vil vi vĉre i stand til at rette fejlen.</html>
BugDialog.bug_description=Hvad lavede du, da denne dialogboks dukkede op? Ved du, hvordan du kan fċ det til at ske igen?
BugDialog.user_email_address=Din e-mailadresse, da vi mċske har spĝrgsmċl
BugDialog.send_button=Send
BugDialog.dont_send_button=Send ikke
BugDialog.old_version_instructions=<html>VASSAL havde en intern fejl. Da denne version af VASSAL ikke lĉngere er aktuel, er bug-rapportering deaktiveret. Hvis du kan reproducere denne fejl med en <a href="https://vassalengine.org/download.html">aktuel version</a> af VASSAL, bedes du gĝre det og gĝre os opmĉrksomme pċ problemet.</html>
BugDialog.test_version_instructions=<html>VASSAL havde en intern fejl. Fordi denne version af VASSAL er en testversion, er bug-rapportering deaktiveret. Hvis du kan reproducere denne fejl med en <a href="https://vassalengine.org/download.html">aktuel version</a> af VASSAL eller bevidst tester denne version, skal du gĝre udviklerne af VASSAL opmĉrksomme pċ problemet.</html>
BugDialog.connection_failed_instructions=<html>VASSAL kunne ikke sende din fejlrapport. Indsend venligst filen <a href="%1$s">%2$s</a> og en beskrivelse af, hvad du lavede, da fejlen opstod i afsnittet <a href="https://forum.vassalengine.org/c/technical-support-bugs/6">Teknisk support & Bugs</a> i VASSAL Forum.</html>
BugDialog.how_to_proceed=Pċ grund af fejlen kan VASSAL vĉre i en inkonsistent tilstand eller opfĝre sig upċlideligt. Vi anbefaler, at du gemmer dine ċbne filer under forskellige navne og genstarter VASSAL.\n\nAfhĉngigt af hvad fejlen var, kan moduler, gemte spil og logfiler skrevet efterfĝlgende vĉre korrupte. Sĝrg for at kontrollere eventuelle moduler, gemte spil eller logfiler, der er skrevet efter en fejl, fĝr du fortsĉtter med at bruge dem.
BugDialog.sending_bug_report=Vent venligst, mens vi sender din fejlrapport til bugtrackeren.

TilingMemoryDialog.title=Ikke nok hukommelse til tiling af billeder
TilingMemoryDialog.heading=Vassal lĝb sandsynligvis tĝr for hukommelse under tiling af billeder
TilingMemoryDialog.message=<html><br/>Dette skyldes sommetider at du har for mange programmer kĝrende pċ samme tid.</i></html>
TilingMemoryDialog.bug_description=Hvad var du i gang med, da denne dialogboks dukkede op? Ved du, hvordan man kan fċ det til at ske igen?
TilingMemoryDialog.collecting_details=VASSAL lĝb sandsynligvis tĝr for hukommelse under tiling af billeder. Vent venligst, mens vi indsamler detaljerne.
TilingMemoryDialog.current_version_instructions=<html><b>Hvis du kĝrer mange programmer, sċ prĝv at lukke nogle af dem og prĝv igen - eller prĝv at genstarte dit operativsystem.</b> Hvis problemet gentager sig, sċ hjĉlp venligst ved at sende os en beskrivelse af, hvad du gjorde, da fejlen opstod, og <u>giv os en mċde at kontakte dig pċ, hvis vi har spĝrgsmċl.</u> </html>
TilingMemoryDialog.old_version_instructions=<html><b>Hvis du kĝrer mange programmer, sċ prĝv at lukke nogle af dem og prĝv igen - eller prĝv at genstarte af dit operativsystem.</b> VASSAL lĝb tĝr for hukommelse, mens billeder blev tilet op. Fordi denne version af VASSAL ikke lĉngere er den nyeste, er fejlrapportering deaktiveret. Hvis du kan genskabe denne fejl med en <a href="https://vassalengine.org/download.html">nyere version</a> af VASSAL, bedes du gĝre det og informere os om problemet.</html>
TilingMemoryDialog.test_version_instructions=<html><b>Hvis du kĝrer mange programmer, sċ prĝv at lukke nogle af dem og prĝv igen - eller prĝv at genstarte dit operativsystem.</b> VASSAL lĝb tĝr for hukommelse, mens billeder blev tilet op. Fordi denne version af VASSAL er en testversion, er fejlrapportering deaktiveret. Hvis du kan genskabe denne fejl med en <a href="https://vassalengine.org/download.html">nyere version</a> af VASSAL eller bevidst tester denne version, skal du informere VASSAL-udviklerne om problemet.</html>
TilingMemoryDialog.connection_failed_instructions=<html>VASSAL kunne ikke sende din fejlrapport. Indsend venligst filen <a href="%1$s">%2$s</a> og en beskrivelse af, hvad du gjorde, da fejlen opstod, i afsnittet <a href="https://forum.vassalengine.org/c/technical-support-bugs/6">Teknisk support og fejl</a> i VASSAL Forum.</html>
TilingMemoryDialog.how_to_proceed=Hvis du kĝrer mange programmer, sċ prĝv at lukke nogle af dem og prĝv igen.

ChildProcessDialog.title=Fejl ved start af proces
ChildProcessDialog.heading=Operativsystemet tillod ikke Vassal at starte nĉste komponent
ChildProcessDialog.message=<html><br/>De mest almindelige ċrsager til dette inkluderer:<br/><br/>(a) Antivirus eller Windows Defender-type programmer blokerer VASSAL i at starte.<br/><br/>(b) For mange programmer kĝrer allerede (operativsystemet er lĝbet tĝr for paging plads)<br/><br/>For yderligere spor om, hvad der forċrsager dette, kan du prĝve at tjekke nederst i fejldetaljerne.</html>
ChildProcessDialog.bug_description=Hvad lavede du, da denne dialogboks dukkede op? Ved du, hvordan man kan genskabe problemet?
ChildProcessDialog.collecting_details=VASSAL lĝb sandsynligvis tĝr for hukommelse. Vent venligst mens vi indsamler detaljerne.
ChildProcessDialog.current_version_instructions=<html><b>Tjek dit antivirus eller Windows Defender for at sikre dig, at de ikke blokerer VASSAL eller Java. Hvis du kĝrer mange programmer, sċ prĝv at lukke nogle af dem og prĝv igen, eller prĝv en ren opstart af dit system.</b> Hvis problemet fortsĉtter med at gentage sig, sċ hjĉlp os ved at sende os en beskrivelse af, hvad du lavede, da fejlen opstod, og <u>giv os en mċde at kontakte dig pċ, hvis vi har spĝrgsmċl.</u> </html>
ChildProcessDialog.old_version_instructions=<html><b>Tjek dit antivirus eller Windows Defender for at sikre dig, at de ikke blokerer VASSAL eller Java. Hvis du kĝrer mange programmer, sċ prĝv at lukke nogle af dem og prĝv igen, eller prĝv en ren opstart af dit system.</b> Fordi denne version af VASSAL ikke lĉngere er aktuel, er fejlrapportering deaktiveret. Hvis du kan genskabe denne fejl med en <a href="https://vassalengine.org/download.html">aktuelt version</a> af VASSAL, sċ gĝr det venligst og gĝr os opmĉrksomme pċ problemet.</html>
ChildProcessDialog.test_version_instructions=<html><b>Tjek dit antivirus eller Windows Defender for at sikre dig, at de ikke blokerer VASSAL eller Java. Hvis du kĝrer mange programmer, sċ prĝv at lukke nogle af dem og prĝv igen, eller prĝv en ren opstart af dit system.</b> Fordi denne version af VASSAL er en testversion, er fejlrapportering deaktiveret. Hvis du kan genskabe denne fejl med en <a href="https://vassalengine.org/download.html">aktuelt version</a> af VASSAL eller bevidst tester denne version, sċ gĝr VASSAL-udviklerne venligst opmĉrksomme pċ problemet.</html>
ChildProcessDialog.connection_failed_instructions=<html>Indsend venligst filen <a href="%1$s">%2$s</a> og en beskrivelse af, hvad du lavede, da fejlen opstod i <a href="https://forum.vassalengine.org/c/technical-support-bugs/6">Teknisk Support & Bugs</a>-afsnittet pċ VASSAL Forum.</html>
ChildProcessDialog.how_to_proceed=Tjek din antivirus eller Windows Defender for at sikre dig, at de ikke blokerer VASSAL eller Java. Hvis du kĝrer mange programmer, skal du prĝve at lukke nogle af dem og prĝve igen, eller prĝv at genstarte dit operativ system.


