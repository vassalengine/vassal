# Joined room on server. Leave the | symbol there as it chooses color. <br> is a line break, which can be moved to an appropriate point.
Chat.explain_joined_room=|Du er nu tilsluttet et spillerum, hvor spillere kan samles og starte eller spille et spil. Hvis nogen allerede har et spil křrende, <br>břr du modtage et billede af kortet (dvs. spillets tilstand) om et řjeblik. Hvis du skal synkronisere manuelt til en spillerens<br> nuvćrende spiltilstand, <br>kan du ogsĺ hřjreklikke pĺ deres navn og vćlge Synkroniser. 
# Explains main room on server. Leave | symbol there as it chooses color. <br> are line breaks. <u>, </u>, <i>, and </i> control underline and italics
Chat.explain_main_room=|Nĺr du er i Hovedrummet, kan du chatte med andre. Nĺr du er klar til at spille, skal du enten oprette et nyt spillerum - eller hvis du planlćgger at spille med nogen, der allerede har oprettet et rum, skal du dobbeltklikke pĺ deres rum pĺ listen for at deltage i det. <br><u><i>Spil kan ikke synkroniseres, mens du er i Hovedrummet, og hvis du starter et spil, vil det ikke blive sendt til andre spillere.</i></u><br>For at oprette et nyt spillerum skal du skrive et navn til dit rum i boksen Nyt rum og derefter klikke pĺ Opret. Du vil nu kunne starte et spil, og andre spillere kan deltage i dit rum.
# Leave the ?<b> at the beginning; move the <img...> tag to an appropriate place if need be, but don't change its contents.
Chat.connect_first=?<b>Du skal forbinde til serveren, fřr du kan oprette et nyt spilrum. Klik pĺ <img src="connect.gif"> knappen i serverkontrollerne til hřjre for at oprette forbindelse.
# Leave the ?<b> at the beginning; move the <img...> tag to an appropriate place if need be, but don't change its contents.
Chat.connect_first_looking=?<b>Du skal forbinde til serveren, fřr du kan finde et spil. Klik pĺ knappen <img src="connect.gif"> i server knapperne til hřjre for at forbinde.
# Leave the ?<b> at the beginning.
Chat.name_first=?<b>Navngiv dit nye spilrum inden du opretter det.
# Leave the !<b> at the beginning. The %1$s goes where it is appropriate to display the name of the new room
Chat.creating_room=!<b>Oprettede og joinede nye spilrum: %1$s
# Leave the | symbol at the beginning. The <br> represents a line break; these can be placed at appropriate point(s).
Chat.explain_created_room=|Du kan nu starte (eller indlćse) et spil, og andre spillere kan slutte sig til dit rum. Nĺr et spil er ĺbent, vil spillere, der slutter sig til rummet, automatisk fĺ tilsendt den aktuelle spiltilstand. En spiller kan ogsĺ hřjreklikke pĺ navnet pĺ en anden spiller, som i řjeblikket har den korrekte spiltilstand, og vćlge "Synkroniser" for at fĺ den aktuelle spiltilstand. Nĺr alle kan se spillet, er I klar til at spille! Trćk vil fremgĺ samtidigt pĺ alles skćrme. 
# Leave the |<b> at the beginning
Chat.sent_sync_request=!<b>Sender synkroniserings anmodning. Vent venligst et řjeblik...
# Leave the ?<b> at the beginning
Chat.sync_too_soon=?<b>For tidligt at sende en anden synkroniseringsanmodning. Vent venligst mindst 15 sekunder, inden du sender en ny anmodning, da spiltilstanden kan tage noget tid at downloade.
# Leave the |<b> at the beginning
Chat.now_looking=!<b>Din status er nu "Pĺ udkig efter spil". Andre spillere kan se udrĺbstegnet og vide, at du sřger efter spil. Du kan annullere denne status ved at klikke pĺ knappen igen.
