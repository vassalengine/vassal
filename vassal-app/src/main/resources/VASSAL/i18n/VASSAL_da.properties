Warning.maximum_heap_too_large_title=Maksimum hukommelses stĝrrelse for stor
Warning.maximum_heap_too_large_heading=Maksimum hukommelses stĝrrelse for stor
Warning.maximum_heap_too_large_message=Den maksimale hukommelses stĝrrelse sat i dine prĉferencer for dette modul er for stor. Bemĉrk at den maksimale hukommelses stĝrrelse skal vĉre mindre end den fysiske RAM i din maskine. Failsafe initial hukommelses stĝrrelse pċ %1$sMB vil i stedet blive brugt. Reducér venligst den maksimale hukommelses stĝrrelse i dine prĉferencer og genstart VASSAL.

Warning.maximum_heap_too_small_title=Maksimum hukommelses stĝrrelse for lille
Warning.maximum_heap_too_small_heading=Maksimum hukommelses stĝrrelse for lille
Warning.maximum_heap_too_small_message=Den maksimale hukommelses stĝrrelse sat i dine prĉferencer for dette modul er for lille. Failsafe initial hukommelses stĝrrelse pċ %1$sMB vil i stedet blive brugt. Ĝg venligst den maksimale hukommelses stĝrrelse i dine prĉferencer og genstart VASSAL.

Warning.initial_heap_too_large_title=Initial hukommelses stĝrrelse for stor
Warning.initial_heap_too_large_heading=Initial hukommelses stĝrrelse for stor
Warning.initial_heap_too_large_message=Den initielle hukommelses stĝrrelse sat i dine prĉferencer for dette modul er for stor. Failsafe initial hukommelses stĝrrelse pċ %1$sMB vil i stedet blive brugt. Reducér venligst den initielle hukommelses stĝrrelse i dine prĉferencer og genstart VASSAL.

Warning.initial_heap_too_small_title=Initial hukommelses stĝrrelse for lille
Warning.initial_heap_too_small_heading=Initial hukommelses stĝrrelse for lille
Warning.initial_heap_too_small_message=Den initielle hukommelses stĝrrelse sat i dine prĉferencer for dette modul er for lille. Failsafe initial hukommelses stĝrrelse pċ %1$sMB vil i stedet blive brugt. Ĝg venligst den initielle hukommelses stĝrrelse i dine prĉferencer og genstart VASSAL.

Error.out_of_memory_title=Ikke mere hukommelse
Error.out_of_memory_heading=Ikke mere hukommelse
Error.out_of_memory_message=VASSAL her lĝbet tĝr for hukommelse. Dette modul krĉver mere hukommelse end den maksimale hukommelses stĝrrelse, du har indstillet til det. Ĝg venligst den maksimale hukommelses stĝrrelse i dine indstillinger og genstart VASSAL.

Error.out_of_memory_reload_title=Ikke mere hukommelse
Error.out_of_memory_reload_heading=Ikke mere hukommelse
Error.out_of_memory_reload_message=VASSAL er lĝbet tĝr for hukommelse. Dette modul krĉver mere hukommelse end den maksimale hukommelses stĝrrelse, du har indstillet til det. VASSAL har fordoblet den maksimale hukommelses stĝrrelse i dine indstillinger. Prĝv at ċbne modulet igen nu, hvor den maksimale hukommelses stĝrrelse er blevet ĝget.

