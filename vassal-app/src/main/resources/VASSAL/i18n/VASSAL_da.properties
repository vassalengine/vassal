Error.assistive_technology_not_found_message=<html>Java kunne ikke indlĉse Java Access Bridge. Dette kan skyldes en fejlagtig eller utilsigtet installation af JAB, muligvis som en del af en skĉrmlĉser eller skĉrmforstĝrrelsespakke, du har installeret. Kontroller, om du har en .accessibility.properties-fil i din brugermappe. Hvis du har det, og du ved, at du ikke bruger den, kan du fjerne den og genstarte VASSAL, hvilket bĝr lĝse dette problem. Hvis du ikke kan lĝse dette problem, bedes du bede om hjĉlp i <a href="https://forum.vassalengine.org/c/technical-support-bugs/6">Technical Support & Bugs</a>-sektionen af VASSAL Forum.</html>

