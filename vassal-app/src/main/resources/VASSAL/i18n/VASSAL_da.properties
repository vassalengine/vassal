BugDialog.title=Ufangede undtagelse
BugDialog.heading=Hjćlp os med at rette denne fejl!
BugDialog.message=<html>VASSAL havde en intern fejl?<i>Du kan hjćlpe!</i></html>
BugDialog.collecting_details=VASSAL havde en intern fejl. Vent venligst mens vi indsamler detaljer.
BugDialog.current_version_instructions=<html><b>Hjćlp os med at rette dette</b> ved at sende os en beskrivelse af, hvad du gjorde, da fejlen opstod, og <u>giv os en mĺde at kontakte dig pĺ, hvis vi har spřrgsmĺl.</u> <i>Det er endnu mere nyttigt, hvis du er klar over handlinger eller trin, der kan reproducere denne fejl pĺlideligt, at beskrive trinnene for os detaljeret.</i> Hvis du bruger et modul, som du ikke har fĺet fra VASSAL-siden (f.eks. hvis du selv laver det, eller du hentede det et andet sted), sĺ lad os venligst vide, hvor vi kan fĺ en kopi. Jo mere information du kan give os, jo mere sandsynligt (og jo hurtigere!) vil vi vćre i stand til at rette fejlen.</html>
BugDialog.bug_description=Hvad lavede du, da denne dialogboks dukkede op? Ved du, hvordan du kan fĺ det til at ske igen?
BugDialog.user_email_address=Din e-mailadresse, da vi mĺske har spřrgsmĺl
BugDialog.send_button=Send
BugDialog.dont_send_button=Send ikke
BugDialog.old_version_instructions=<html>VASSAL havde en intern fejl. Da denne version af VASSAL ikke lćngere er aktuel, er bug-rapportering deaktiveret. Hvis du kan reproducere denne fejl med en <a href="https://vassalengine.org/download.html">aktuel version</a> af VASSAL, bedes du gřre det og gřre os opmćrksomme pĺ problemet.</html>
BugDialog.test_version_instructions=<html>VASSAL havde en intern fejl. Fordi denne version af VASSAL er en testversion, er bug-rapportering deaktiveret. Hvis du kan reproducere denne fejl med en <a href="https://vassalengine.org/download.html">aktuel version</a> af VASSAL eller bevidst tester denne version, skal du gřre udviklerne af VASSAL opmćrksomme pĺ problemet.</html>
BugDialog.connection_failed_instructions=<html>VASSAL kunne ikke sende din fejlrapport. Indsend venligst filen <a href="%1$s">%2$s</a> og en beskrivelse af, hvad du lavede, da fejlen opstod i afsnittet <a href="https://forum.vassalengine.org/c/technical-support-bugs/6">Teknisk support & Bugs</a> i VASSAL Forum.</html>
BugDialog.how_to_proceed=Pĺ grund af fejlen kan VASSAL vćre i en inkonsistent tilstand eller opfřre sig upĺlideligt. Vi anbefaler, at du gemmer dine ĺbne filer under forskellige navne og genstarter VASSAL.\n\nAfhćngigt af hvad fejlen var, kan moduler, gemte spil og logfiler skrevet efterfřlgende vćre korrupte. Sřrg for at kontrollere eventuelle moduler, gemte spil eller logfiler, der er skrevet efter en fejl, fřr du fortsćtter med at bruge dem.
BugDialog.sending_bug_report=Vent venligst, mens vi sender din fejlrapport til bugtrackeren.

TilingMemoryDialog.title=Ikke nok hukommelse til tiling af billeder
TilingMemoryDialog.heading=Vassal lřb sandsynligvis třr for hukommelse under tiling af billeder
TilingMemoryDialog.message=<html><br/>Dette skyldes sommetider at du har for mange programmer křrende pĺ samme tid.</i></html>
TilingMemoryDialog.bug_description=Hvad var du i gang med, da denne dialogboks dukkede op? Ved du, hvordan man kan fĺ det til at ske igen?
