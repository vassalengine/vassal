TilingMemoryDialog.old_version_instructions=<html><b>Hvis du křrer mange programmer, sĺ prřv at lukke nogle af dem og prřv igen - eller prřv at genstarte af dit operativsystem.</b> VASSAL lřb třr for hukommelse, mens billeder blev tilet op. Fordi denne version af VASSAL ikke lćngere er den nyeste, er fejlrapportering deaktiveret. Hvis du kan genskabe denne fejl med en <a href="https://vassalengine.org/download.html">nyere version</a> af VASSAL, bedes du gřre det og informere os om problemet.</html>
TilingMemoryDialog.test_version_instructions=<html><b>Hvis du křrer mange programmer, sĺ prřv at lukke nogle af dem og prřv igen - eller prřv at genstarte dit operativsystem.</b> VASSAL lřb třr for hukommelse, mens billeder blev tilet op. Fordi denne version af VASSAL er en testversion, er fejlrapportering deaktiveret. Hvis du kan genskabe denne fejl med en <a href="https://vassalengine.org/download.html">nyere version</a> af VASSAL eller bevidst tester denne version, skal du informere VASSAL-udviklerne om problemet.</html>
TilingMemoryDialog.connection_failed_instructions=<html>VASSAL kunne ikke sende din fejlrapport. Indsend venligst filen <a href="%1$s">%2$s</a> og en beskrivelse af, hvad du gjorde, da fejlen opstod, i afsnittet <a href="https://forum.vassalengine.org/c/technical-support-bugs/6">Teknisk support og fejl</a> i VASSAL Forum.</html>
TilingMemoryDialog.how_to_proceed=Hvis du křrer mange programmer, sĺ prřv at lukke nogle af dem og prřv igen.

ChildProcessDialog.title=Fejl ved start af proces
ChildProcessDialog.heading=Operativsystemet tillod ikke Vassal at starte nćste komponent
ChildProcessDialog.message=<html><br/>De mest almindelige ĺrsager til dette inkluderer:<br/><br/>(a) Antivirus eller Windows Defender-type programmer blokerer VASSAL i at starte.<br/><br/>(b) For mange programmer křrer allerede (operativsystemet er lřbet třr for paging plads)<br/><br/>For yderligere spor om, hvad der forĺrsager dette, kan du prřve at tjekke nederst i fejldetaljerne.</html>
ChildProcessDialog.bug_description=Hvad lavede du, da denne dialogboks dukkede op? Ved du, hvordan man kan genskabe problemet?
ChildProcessDialog.collecting_details=VASSAL lřb sandsynligvis třr for hukommelse. Vent venligst mens vi indsamler detaljerne.
ChildProcessDialog.current_version_instructions=<html><b>Tjek dit antivirus eller Windows Defender for at sikre dig, at de ikke blokerer VASSAL eller Java. Hvis du křrer mange programmer, sĺ prřv at lukke nogle af dem og prřv igen, eller prřv en ren opstart af dit system.</b> Hvis problemet fortsćtter med at gentage sig, sĺ hjćlp os ved at sende os en beskrivelse af, hvad du lavede, da fejlen opstod, og <u>giv os en mĺde at kontakte dig pĺ, hvis vi har spřrgsmĺl.</u> </html>
ChildProcessDialog.old_version_instructions=<html><b>Tjek dit antivirus eller Windows Defender for at sikre dig, at de ikke blokerer VASSAL eller Java. Hvis du křrer mange programmer, sĺ prřv at lukke nogle af dem og prřv igen, eller prřv en ren opstart af dit system.</b> Fordi denne version af VASSAL ikke lćngere er aktuel, er fejlrapportering deaktiveret. Hvis du kan genskabe denne fejl med en <a href="https://vassalengine.org/download.html">aktuelt version</a> af VASSAL, sĺ gřr det venligst og gřr os opmćrksomme pĺ problemet.</html>
ChildProcessDialog.test_version_instructions=<html><b>Tjek dit antivirus eller Windows Defender for at sikre dig, at de ikke blokerer VASSAL eller Java. Hvis du křrer mange programmer, sĺ prřv at lukke nogle af dem og prřv igen, eller prřv en ren opstart af dit system.</b> Fordi denne version af VASSAL er en testversion, er fejlrapportering deaktiveret. Hvis du kan genskabe denne fejl med en <a href="https://vassalengine.org/download.html">aktuelt version</a> af VASSAL eller bevidst tester denne version, sĺ gřr VASSAL-udviklerne venligst opmćrksomme pĺ problemet.</html>
ChildProcessDialog.connection_failed_instructions=<html>Indsend venligst filen <a href="%1$s">%2$s</a> og en beskrivelse af, hvad du lavede, da fejlen opstod i <a href="https://forum.vassalengine.org/c/technical-support-bugs/6">Teknisk Support & Bugs</a>-afsnittet pĺ VASSAL Forum.</html>
ChildProcessDialog.how_to_proceed=Tjek din antivirus eller Windows Defender for at sikre dig, at de ikke blokerer VASSAL eller Java. Hvis du křrer mange programmer, skal du prřve at lukke nogle af dem og prřve igen, eller prřv at genstarte dit operativ system.


