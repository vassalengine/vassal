Error.socket_error_heading=Socket-fejl
Error.socket_error_message=Socket'en, hvorpċ Modul manageren kommunikerer, har haft en fejl. Genstart VASSAL.

Error.not_a_configurable_title=Klassen implementeret ikke Configurable interfacet
Error.not_a_configurable_heading=Klassen implementeret ikke Configurable interfacet
